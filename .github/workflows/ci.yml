name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go test ./... -race -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
